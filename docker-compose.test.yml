version: '3.8'

services:
  test-runner:
    build:
      context: ./ProyectLP2
      dockerfile: Dockerfile.test
    volumes:
      - /var/jenkins_home/.m2:/root/.m2
    working_dir: /app
    depends_on:
      mysql_cine_app:
        condition: service_healthy

  mysql_cine_app:
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 5
