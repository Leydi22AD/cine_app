version: '3.8'

services:
  backend:
    build:
      context: ./ProyectLP2
      dockerfile: Dockerfile
    container_name: cine_app_backend
    ports:
      - "8082:8082"
    depends_on:
      mysql_cine_app:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_cine_app:3306/cine_app_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build:
      context: ./Lp2-Frontend
      dockerfile: Dockerfile
    container_name: cine_app_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mysql_cine_app:
    image: mysql:8.0
    container_name: mysql_cine_app_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin123
      - MYSQL_DATABASE=cine_app_db
    volumes:
      - mysql_cine_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_cine_data: