version: '3.8'

services:
  backend:
    build:
      context: ./ProyectLP2
      dockerfile: Dockerfile
    container_name: cine_app_backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql_cine_app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_cine_app:3306/cine_app_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build:
      context: ./Lp2-Frontend
      dockerfile: Dockerfile
    container_name: cine_app_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mysql_cine_app:
    image: mysql:8.0
    container_name: mysql_cine_app_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin123
      - MYSQL_DATABASE=cine_app_db
    volumes:
      - mysql_cine_data:/var/lib/mysql

  # SERVICIO CORREGIDO: El volumen ahora se pasa como una variable de entorno
  test-runner:
    image: maven:3.9.6-eclipse-temurin-21
    volumes:
      # La ruta del código fuente se inyecta desde el Jenkinsfile
      - ${CODE_PATH}:/app
      # Montamos el repositorio local de Maven para no descargar dependencias cada vez
      - /var/jenkins_home/.m2:/root/.m2
    working_dir: /app
    depends_on:
      - mysql_cine_app

volumes:
  mysql_cine_data: