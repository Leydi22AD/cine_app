<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-film fs-1 text-warning"></i>
      <h2 class="fw-bold text-warning mt-3">CINE ONLINE</h2>
      <p class="text-warning">Iniciar Sesión</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="mb-3">
        <label class="form-label text-warning">
          <i class="bi bi-envelope me-2"></i>Correo Electrónico
        </label>
        <input 
          type="email" 
          class="form-control" 
          [(ngModel)]="credentials.email" 
          name="email" 
          placeholder="correo@ejemplo.com"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label text-warning">
          <i class="bi bi-lock me-2"></i>Contraseña
        </label>
        <input 
          type="password" 
          class="form-control" 
          [(ngModel)]="credentials.password" 
          name="password" 
          placeholder="••••••••"
          required>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="btn btn-success w-100 py-2" 
        [disabled]="!loginForm.valid">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
      </button>

      <div class="text-center mt-3">
        <p class="mb-0 text-warning">
          ¿No tienes cuenta? 
          <a routerLink="/register" class="text-warning fw-bold">
            Regístrate aquí
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
