version: '3.8'

services:
  # Servicio del Backend para DESARROLLO
  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: app-cine-backend-dev
    working_dir: /app
    volumes:
      # CORREGIDO: Montar la carpeta correcta 'ProyectLP2'
      - ./ProyectLP2:/app
      - ~/.m2:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8082:8082"
      - "9999:9999"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cine?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      MAVEN_OPTS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:9999
    depends_on:
      - db
    networks:
      - cine-network

  # Servicio del Frontend para DESARROLLO
  frontend:
    image: node:20-alpine
    container_name: app-cine-frontend-dev
    working_dir: /app
    volumes:
      # CORREGIDO: Montar la carpeta correcta 'Lp2-Frontend'
      - ./Lp2-Frontend:/app
      - /app/node_modules
    command: npm start
    ports:
      - "4200:4200"
    networks:
      - cine-network

  # Servicio de la Base de Datos
  db:
    image: mysql:8.0
    container_name: mysql-cine-dev
    restart: always
    environment:
      MYSQL_DATABASE: cine
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3309:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - cine-network

volumes:
  mysql_data_dev:

networks:
  cine-network:
    driver: bridge
