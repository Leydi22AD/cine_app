version: '3.8'

services:
  test-runner:
    image: maven:3.9.6-eclipse-temurin-21
    volumes:
      # La ruta del código fuente se inyecta desde el Jenkinsfile
      - ${CODE_PATH}:/app
      # Montamos el repositorio local de Maven para no descargar dependencias cada vez
      - /var/jenkins_home/.m2:/root/.m2
    working_dir: /app
    depends_on:
      - mysql_cine_app
