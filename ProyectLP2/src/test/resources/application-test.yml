spring:
  datasource:
    # Usamos el nombre del contenedor de la base de datos como host
    url: jdbc:mysql://mysql_cine_app_db:3306/cine_app_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: admin123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 'create-drop' es ideal para tests: crea el esquema al inicio y lo borra al final
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.MySQLDialect
    # Mostrar SQL es útil para depurar, pero puede ser verboso. Lo dejamos por ahora.
    show-sql: true
  # Desactivamos la inicialización de la base de datos por SQL para los tests,
  # ya que Hibernate se encargará de crear el esquema.
  sql:
    init:
      mode: never
