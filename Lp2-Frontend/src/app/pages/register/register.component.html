<div class="register-container">
  <div class="register-card">
    <div class="text-center mb-4">
      <h2 class="register-title">Registro de Usuario</h2>
      <p class="text-warning">Crea tu cuenta en CineApp</p>
    </div>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">
      <div class="mb-3">
        <label for="nombre" class="form-label text-warning">Nombre completo</label>
        <input 
          type="text" 
          class="form-control" 
          id="nombre"
          [(ngModel)]="usuario.nombre" 
          name="nombre"
          placeholder="Ingrese su nombre completo"
          required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label text-warning">Correo electrónico</label>
        <input 
          type="email" 
          class="form-control" 
          id="email"
          [(ngModel)]="usuario.email" 
          name="email"
          placeholder="correo@ejemplo.com"
          required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label text-warning">Contraseña</label>
        <input 
          type="password" 
          class="form-control" 
          id="password"
          [(ngModel)]="usuario.password" 
          name="password"
          placeholder="Ingrese su contraseña"
          required>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary w-100 mb-3"
        [disabled]="!registerForm.valid">
        Registrarse
      </button>

      <div class="text-center">
        <p class="mb-0">
          ¿Ya tienes cuenta? 
          <a href="#" (click)="goToLogin(); $event.preventDefault()" class="text-primary">
            Inicia sesión aquí
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
